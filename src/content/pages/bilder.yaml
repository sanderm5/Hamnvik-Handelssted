heading: Bilder
deck: Fra lokalitetene og livet på handelsstedet
byline: "Hamnvik Handelssted · Ibestad"
intro: >-
  Her legger vi ut bilder av lokalitetene og fra tidligere besøk og arrangement
  som har vært siden vi startet opp i 2006 med restaureringa av brygga.
