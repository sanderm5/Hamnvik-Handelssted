restaureringHeading: Restaurering
restaureringText: >-
  Restaurering av handelsstedet har vært et pågående arbeid. Kaia og Gammelbrygga
  har fått særlig oppmerksomhet, og arbeidet startet i 2006. Hotellet fra 1896
  restaureres fortsatt. Gjennom dette arbeidet bevares et av Nord-Norges
  best bevarte handelsstedsmiljøer for fremtidige generasjoner.
