heading: Der historien lever videre
deck: "Et fredet handelssted fra 1794 — ved fjorden i Hamnvik, Ibestad"
byline: "Donsegården · Hamnvik, Troms"
intro: >-
  Der fjorden møter fjellet i Hamnvik ligger Donsegården — et fredet handelssted
  der historien lever videre gjennom mat, kultur og gjestfrihet.
bodyText1: >-
  Siden 1794 har dette vært et samlingspunkt på kysten av Troms. Det som begynte
  som Jens Bing Dons og Ingeborg Anna Normann Dons sitt handelssted, er i dag et
  levende kulturminne der du kan spise godt, overnatte i historiske rom og oppleve
  fortellingene fra over to hundre år med kystkultur.
bodyText2: >-
  Vi åpner dørene for deg som vil oppleve noe utenom det vanlige — enten det er
  et selskap med hjemmelagd tradisjonsmat, en natt i de gamle bygningene, eller en
  stund i krambua mellom husflid og håndverk.
pullQuote: >-
  Et levende kulturminne der du kan spise godt, overnatte i historiske rom
  og oppleve fortellingene fra over to hundre år med kystkultur.
cards:
  - title: Servering
    link: /servering
    description: "Norsk tradisjonsmat tilberedt med omtanke, servert i autentiske omgivelser. Alle rettigheter."
  - title: Overnatting
    link: /overnatting
    description: "Sov i bygninger med sjel og historie, med utsikt over fjord og fjell."
  - title: Møte & Fest
    link: ""
    description: "Lokaler med karakter for jubileum, selskap, møter og sammenkomster."
  - title: Kulturformidling
    link: /kulturformidling
    description: "Omvisning, kåserier og bildevisning i museale rom fulle av fortellinger."
  - title: Krambu
    link: /krambu
    description: "Husflidsutsalg i den gamle krambua — ta med et stykke kystkultur hjem."
dampskipHeading: Fra dampskip til dørsterskel
dampskipText: >-
  En gang la dampskipene til kai her og brakte varer fra hele verden til handelsstedet
  i Hamnvik. I dag er det gjestene som ankommer — til et sted der tiden har
  stått stille, men vertskapet er like varmt som det alltid har vært.
dampskipImage: /images/maleri.png
dampskipImageAlt: Maleri av Hamnvik Handelssted med dampskip i havna
dampskipImageCaption: "Dampskibet Prins Gustav ankommer Havnviken, 1838"
dampskipFotefarText: Handelsstedet er en del av Ibestad kommunes fotefarprosjekt.
noticeTitle: Bestilling
noticeText: Ta kontakt for tilbud og bestilling.
testimonials:
  - quote: >-
      Et helt spesielt måltid på et helt spesielt sted.
      Vi er trollbundet av hus, vertskap og historie.
    source: Ruth med gjester
  - quote: "Utrolig hyggelig og spennende omvisning på et historisk sted. Her kommer vi tilbake!"
    source: Kjetil Rolnes
  - quote: "Tusen takk for en flott omvisning, et godt måltid og spennende historier."
    source: "Trond Giske · Juli 2008"
