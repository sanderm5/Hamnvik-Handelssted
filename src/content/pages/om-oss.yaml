heading: Om Hamnvik Handelssted
deck: "To hundre års handel, gjestfrihet og kystkultur på én og samme brygge"
byline: "Donsegården · Hamnvik, Ibestad"
intro: >-
  I over to hundre år har Donsegården vært et knutepunkt på kysten av Troms —
  et sted der handel, gjestfrihet og kystkultur har gått hånd i hånd.
introBody: >-
  Hamnvik var et viktig handelssenter i Astafjordregionen på 1700- og 1800-tallet.
  Det fungerte ikke bare som handelsplass, men også som sete for embetsmannsverk
  med lensmann, sorenskriver og sogneprest. Handelsstedet mistet sin dominerende
  rolle da Harstad vokste frem på 1900-tallet.
pullQuote1: >-
  Gjennom generasjoner har familien Dons holdt stedet i hevd.
  Bygningene forteller i dag sin historie til alle som vil lytte.
sections:
  - heading: "Grunnleggeren: Jens Bing Dons"
    content: >-
      Jens Bing Dons (1771–1823), sønn av major Lorentz Dons, kom nordover som farmasøyt
      og grunnla handelsstedet i 1794 sammen med Ingeborg Anna Normann Dons.
      Han fikk gjestgiverbevilling i 1795. Et kjent besøk var prins Ludvig Filip —
      senere borgerkonge i Frankrike — som tok inn samme år, på flukt fra revolusjonen.

      Forretningen blomstret, og jektefart ble en viktig næring. I krigsperioden 1807–1814
      handlet Dons med russerne fra Arkhangelsk for å sikre forsyninger til befolkningen.
    image: /images/maleri.png
    imageAlt: Historisk maleri av handelsstedet med dampskip ved kai
    imageCaption: "Dampskibet Prins Gustav ankommer Havnviken, 1838"
    pullQuote: ""
  - heading: Nicolai Normann Dons
    content: >-
      Nicolai Normann Dons (1798–1891) overtok handelsstedet etter farens død i 1823.
      Han fortsatte jektefarten, ble poståpner i 1827, og var dampskipsekspeditør fra 1837.
      Han ble også valgt til stortingssuppleant for Finnmarkens amt (1848–1851).

      Ibestad Sparebank var den første landssparebanken i Nord-Norge og ble opprettet
      i Hamnvik i 1843. Nicolai var administrerende direktør fra 1843 til 1870.

      I 1873 var kong Oscar II gjest på stedet, og i 1875 ble Nicolai utnevnt til ridder
      av St. Olavs orden.
