    imageAlt: ""
    imageCaption: ""
    pullQuote: "I 1873 var kong Oscar II gjest på stedet, og i 1875 ble Nicolai utnevnt til ridder av St. Olavs orden."
  - heading: Bygningene
    content: >-
      Hamnvik er et av få norske handelssteder som har bevart sin gamle bebyggelse.
      Deler av byggene stammer fra slutten av 1700-tallet og er i god teknisk stand.
      Området er fredet og består av 14 bygninger, inkludert hovedbygningen (fra 1794),
      gammelbrygga, stabbur, bakeri, hotell (fra 1896) og flere andre strukturer.
      Sjøhusene med sine karakteristiske gule vegger og røde tak reiser seg langs brygga,
      slik de har gjort i generasjoner.
    image: /images/IMG_1853.jpg
    imageAlt: "Hamnvik Handelssted sett fra sjøen, med gule sjøhus langs brygga"
    imageCaption: "Handelsstedet slik det fremstår i dag, sett fra sjøsiden"
    pullQuote: ""
  - heading: Dampskipenes tid
    content: >-
      Da dampskipstrafikken kom til Nord-Norge på 1800-tallet, ble Hamnvik et naturlig
      stoppested langs kystruta. Dampskibet Prins Gustav var blant de første som la
      til kai her i 1838. Med skipene kom varer, nyheter og reisende fra fjern og nær,
      og handelsstedet blomstret som aldri før.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Nedgang
    content: >-
      Handelsstedenes storhetstid endte på 1870-tallet. I 1872 forliste galeasen «Njord»,
      og dampskipsrutene tok over mer av godstrafikken. Den nye handelsloven av 1868
      markerte slutten på Hamnviks dominans.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Moderne tid
    content: >-
      I løpet av 1960-årene stoppet aktivitetene som gårdsbruk, dampskipsekspedisjon og
      postkontor. På 1980-tallet begynte man å arrangere markedsdager. Michael Sund,
      en kulturkonsulent, hjalp til med å gjøre handelsstedet til et kulturbasert
      reiselivsprosjekt for Ibestad kommune.

      I dag tilbys aktiviteter som servering, pub, utstillinger, konserter, teater og kurs.
      Hotellet fra 1896 restaureres fortsatt.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Diktet fra 1894
    content: >-
      Provst Bendix Blom skrev et lengre dikt til handelsstedets hundreårsjubileum i 1894
      som hyller Jens Bing Dons og beskriver familiens historie, deres prøvelser under
      krigen i 1814, og deres velstand og samfunnsbidrag.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Fotefarprosjektet
    content: >-
      Hamnvik Handelssted er en del av Ibestad kommunes fotefarprosjekt — et arbeid
      for å ta vare på sporene etter de som levde og virket her før oss. Gjennom stedet
      formidles ikke bare arkitektur og gjenstander, men også fortellingene om menneskene
      som skapte kystsamfunnet i Ibestad.
