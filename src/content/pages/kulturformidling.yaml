heading: Kulturformidling
deck: "Omvisning, kåserier og bildevisning i museale rom fulle av fortellinger"
byline: "Donsegården · Hamnvik, Ibestad"
intro: >-
  Bygningene på Hamnvik Handelssted er ikke bare vakre — de er fulle av fortellinger.
  Vi deler dem gjerne med deg.
sections:
  - heading: Museale lokaler
    content: >-
      Flere av rommene på handelsstedet er bevart som museale utstillinger og gir et
      innblikk i hverdagslivet på et nordnorsk handelssted gjennom ulike tidsepoker.
      Her kan du se gjenstander, bilder og dokumenter som forteller om menneskene
      som levde og arbeidet her — fra grunnleggelsen i 1794 og frem til i dag.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Kåserier & bildevisning
    content: >-
      For grupper og selskaper tilbyr vi kåserier med bildevisning om handelsstedets
      utvikling gjennom over to hundre år. Fortellingene spenner fra Jens Bing Dons
      sin tid, gjennom dampskipenes storhetstid da Prins Gustav la til kai i 1838,
      til kongebesøket i 2011 da Kong Harald og Dronning Sonja ble vist rundt
      i hovedhuset.
    image: /images/maleri.png
    imageAlt: Maleri av Havnviken med sjøhus og seilskip på 1800-tallet
    imageCaption: Havnviken slik en kunstner så den på 1800-tallet
    pullQuote: >-
      Fortellingene spenner fra 1794, gjennom dampskipenes storhetstid,
      til kongebesøket i 2011.
  - heading: ""
    content: ""
    image: /images/kongeskipet.png
    imageAlt: Kongeskipet KS Norge fortøyd ved kai i Hamnvik
    imageCaption: Kongeskipet ved kai i 2011
    pullQuote: ""
  - heading: Fotefarprosjektet
    content: >-
      Handelsstedet er en del av Ibestad kommunes fotefarprosjekt, som arbeider med å
      dokumentere og formidle sporene etter tidligere generasjoners liv og virke i
      kommunen. Gjennom dette prosjektet settes handelsstedets historie inn i en
      større sammenheng — som en del av den lange fortellingen om kystsamfunnet
      i Troms.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
noticeTitle: Bestill kulturformidling
noticeText: >-
  Kulturformidling kan bestilles for grupper og selskaper,
  gjerne i kombinasjon med et måltid tradisjonsmat.
  Ta kontakt for informasjon og bestilling.
