<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none" stroke="#c8b898" stroke-width="2" opacity="1">
  <!-- Stort sentralt handelshus-segl -->
  <g transform="translate(600, 600)" opacity="1">
    <!-- Ytre sirkel med ornament-border -->
    <circle cx="0" cy="0" r="300" stroke-width="3"/>
    <circle cx="0" cy="0" r="290" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="280" stroke-width="2"/>
    <circle cx="0" cy="0" r="270" stroke-width="0.8"/>

    <!-- Dekorativ prikket sirkel -->
    <circle cx="0" cy="0" r="260" stroke-width="1" stroke-dasharray="3 8"/>

    <!-- Mellom-sirkel -->
    <circle cx="0" cy="0" r="230" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="225" stroke-width="0.8"/>

    <!-- Tekst-bue øverst: HAMNVIK HANDELSSTED -->
    <path id="textArcTop" d="M -200,0 A 200,200 0 0,1 200,0" fill="none" stroke="none"/>
    <text font-family="'Playfair Display SC', serif" font-size="22" fill="#c8b898" fill-opacity="1" stroke="none" letter-spacing="8" font-weight="700">
      <textPath href="#textArcTop" startOffset="50%" text-anchor="middle">HAMNVIK HANDELSSTED</textPath>
    </text>

    <!-- Tekst-bue nederst -->
    <path id="textArcBottom" d="M 200,0 A 200,200 0 0,1 -200,0" fill="none" stroke="none"/>
    <text font-family="'Playfair Display SC', serif" font-size="16" fill="#c8b898" fill-opacity="1" stroke="none" letter-spacing="5" font-weight="700">
      <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">DONSEG&#xC5;RDEN &#xB7; IBESTAD</textPath>
    </text>

    <!-- Dekorative diamanter mellom tekst -->
    <polygon points="-220,-8 -215,0 -220,8 -225,0" fill="#c8b898" fill-opacity="0.8" stroke-width="1"/>
    <polygon points="220,-8 225,0 220,8 215,0" fill="#c8b898" fill-opacity="0.8" stroke-width="1"/>

    <!-- Indre dekorativ ramme -->
    <circle cx="0" cy="0" r="150" stroke-width="2"/>
    <circle cx="0" cy="0" r="145" stroke-width="0.6"/>

    <!-- Årstall 1794 — stort, sentralt -->
    <text font-family="'Playfair Display', serif" font-size="82" fill="#c8b898" fill-opacity="1" stroke="none" text-anchor="middle" y="28" letter-spacing="14" font-weight="700">1794</text>

    <!-- Dekorative streker over og under årstallet -->
    <line x1="-90" y1="-42" x2="90" y2="-42" stroke-width="2"/>
    <line x1="-65" y1="-52" x2="65" y2="-52" stroke-width="1"/>
    <line x1="-90" y1="48" x2="90" y2="48" stroke-width="2"/>
    <line x1="-65" y1="58" x2="65" y2="58" stroke-width="1"/>

    <!-- Dekorative hjørneornament inni sirkelen -->
    <g stroke-width="1.2">
      <!-- Øverst -->
      <path d="M -35,-120 Q 0,-140 35,-120" fill="none"/>
      <path d="M -22,-113 Q 0,-126 22,-113" fill="none"/>
      <!-- Nederst -->
      <path d="M -35,120 Q 0,140 35,120" fill="none"/>
      <path d="M -22,113 Q 0,126 22,113" fill="none"/>
    </g>

    <!-- Små stjerner/ornament på sirkelkanten -->
    <g fill="#c8b898" fill-opacity="0.7" stroke-width="1">
      <polygon points="0,-280 6,-268 0,-256 -6,-268"/>
      <polygon points="0,256 6,268 0,280 -6,268"/>
      <polygon points="-280,0 -268,-6 -256,0 -268,6"/>
      <polygon points="256,0 268,-6 280,0 268,6"/>
    </g>

    <!-- Kors-ornament på diagonalene -->
    <g fill="#c8b898" fill-opacity="0.5" stroke-width="0.8">
      <polygon points="-198,-198 -192,-186 -186,-198 -192,-210"/>
      <polygon points="198,-198 192,-186 186,-198 192,-210"/>
      <polygon points="-198,198 -192,186 -186,198 -192,210"/>
      <polygon points="198,198 192,186 186,198 192,210"/>
    </g>

    <!-- Victoranske filigran-svinger -->
    <g stroke-width="1.2" fill="none" opacity="1">
      <path d="M -100,-80 Q -125,-105 -100,-115 Q -75,-105 -100,-80"/>
      <path d="M 100,-80 Q 125,-105 100,-115 Q 75,-105 100,-80"/>
      <path d="M -100,80 Q -125,105 -100,115 Q -75,105 -100,80"/>
      <path d="M 100,80 Q 125,105 100,115 Q 75,105 100,80"/>
    </g>
  </g>

  <!-- Hjørneornament -->
  <g stroke-width="1.2" opacity="0.5">
    <!-- Øvre venstre -->
    <path d="M 40,40 L 40,100 Q 40,120 60,120 L 120,120"/>
    <path d="M 50,50 L 50,90 Q 50,110 70,110 L 110,110"/>
    <!-- Øvre høyre -->
    <path d="M 1160,40 L 1160,100 Q 1160,120 1140,120 L 1080,120"/>
    <path d="M 1150,50 L 1150,90 Q 1150,110 1130,110 L 1090,110"/>
    <!-- Nedre venstre -->
    <path d="M 40,1160 L 40,1100 Q 40,1080 60,1080 L 120,1080"/>
    <path d="M 50,1150 L 50,1110 Q 50,1090 70,1090 L 110,1090"/>
    <!-- Nedre høyre -->
    <path d="M 1160,1160 L 1160,1100 Q 1160,1080 1140,1080 L 1080,1080"/>
    <path d="M 1150,1150 L 1150,1110 Q 1150,1090 1130,1090 L 1090,1090"/>
  </g>
</svg>
