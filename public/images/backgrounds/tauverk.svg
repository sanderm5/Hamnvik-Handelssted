<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none" stroke="#c8b898" stroke-width="0.8" opacity="1">
  <!-- Stor Carrick Bend knute i sentrum -->
  <g transform="translate(600, 500)" stroke-width="1.2" opacity="0.35">
    <!-- Tau 1 — over-under vevemønster -->
    <path d="M -120,-60 C -80,-100 -20,-100 20,-60 C 60,-20 60,40 20,80 C -20,120 -80,120 -120,80 C -160,40 -160,-20 -120,-60" stroke-linecap="round"/>
    <!-- Tau 2 — kryssende -->
    <path d="M -60,-120 C -100,-80 -100,-20 -60,20 C -20,60 40,60 80,20 C 120,-20 120,-80 80,-120 C 40,-160 -20,-160 -60,-120" stroke-linecap="round"/>
    <!-- Tau-ender -->
    <path d="M -120,-60 C -180,-120 -220,-100 -260,-80" stroke-linecap="round"/>
    <path d="M -120,80 C -180,140 -220,120 -280,100" stroke-linecap="round"/>
    <path d="M 80,-120 C 140,-180 160,-220 180,-260" stroke-linecap="round"/>
    <path d="M 80,20 C 160,60 200,40 260,20" stroke-linecap="round"/>
  </g>

  <!-- Tau-border øverst -->
  <g stroke-width="0.6" opacity="0.2">
    <path d="M 0,60 Q 30,40 60,60 Q 90,80 120,60 Q 150,40 180,60 Q 210,80 240,60 Q 270,40 300,60 Q 330,80 360,60 Q 390,40 420,60 Q 450,80 480,60 Q 510,40 540,60 Q 570,80 600,60 Q 630,40 660,60 Q 690,80 720,60 Q 750,40 780,60 Q 810,80 840,60 Q 870,40 900,60 Q 930,80 960,60 Q 990,40 1020,60 Q 1050,80 1080,60 Q 1110,40 1140,60 Q 1170,80 1200,60"/>
    <path d="M 0,65 Q 30,45 60,65 Q 90,85 120,65 Q 150,45 180,65 Q 210,85 240,65 Q 270,45 300,65 Q 330,85 360,65 Q 390,45 420,65 Q 450,85 480,65 Q 510,45 540,65 Q 570,85 600,65 Q 630,45 660,65 Q 690,85 720,65 Q 750,45 780,65 Q 810,85 840,65 Q 870,45 900,65 Q 930,85 960,65 Q 990,45 1020,65 Q 1050,85 1080,65 Q 1110,45 1140,65 Q 1170,85 1200,65"/>
  </g>

  <!-- Tau-border nederst -->
  <g stroke-width="0.6" opacity="0.2">
    <path d="M 0,1140 Q 30,1120 60,1140 Q 90,1160 120,1140 Q 150,1120 180,1140 Q 210,1160 240,1140 Q 270,1120 300,1140 Q 330,1160 360,1140 Q 390,1120 420,1140 Q 450,1160 480,1140 Q 510,1120 540,1140 Q 570,1160 600,1140 Q 630,1120 660,1140 Q 690,1160 720,1140 Q 750,1120 780,1140 Q 810,1160 840,1140 Q 870,1120 900,1140 Q 930,1160 960,1140 Q 990,1120 1020,1140 Q 1050,1160 1080,1140 Q 1110,1120 1140,1140 Q 1170,1160 1200,1140"/>
    <path d="M 0,1145 Q 30,1125 60,1145 Q 90,1165 120,1145 Q 150,1125 180,1145 Q 210,1165 240,1145 Q 270,1125 300,1145 Q 330,1165 360,1145 Q 390,1125 420,1145 Q 450,1165 480,1145 Q 510,1125 540,1145 Q 570,1165 600,1145 Q 630,1125 660,1145 Q 690,1165 720,1145 Q 750,1125 780,1145 Q 810,1165 840,1145 Q 870,1125 900,1145 Q 930,1165 960,1145 Q 990,1125 1020,1145 Q 1050,1165 1080,1145 Q 1110,1125 1140,1145 Q 1170,1165 1200,1145"/>
  </g>

  <!-- Liten knute — øvre venstre -->
  <g transform="translate(180, 250) scale(0.4)" stroke-width="1.5" opacity="0.2">
    <path d="M -80,-40 C -50,-70 10,-70 40,-40 C 70,-10 70,30 40,60 C 10,90 -50,90 -80,60 C -110,30 -110,-10 -80,-40" stroke-linecap="round"/>
    <path d="M -40,-80 C -70,-50 -70,10 -40,40 C -10,70 30,70 60,40 C 90,10 90,-50 60,-80 C 30,-110 -10,-110 -40,-80" stroke-linecap="round"/>
  </g>

  <!-- Liten knute — øvre høyre -->
  <g transform="translate(1020, 280) scale(0.35)" stroke-width="1.5" opacity="0.2">
    <path d="M -80,-40 C -50,-70 10,-70 40,-40 C 70,-10 70,30 40,60 C 10,90 -50,90 -80,60 C -110,30 -110,-10 -80,-40" stroke-linecap="round"/>
    <path d="M -40,-80 C -70,-50 -70,10 -40,40 C -10,70 30,70 60,40 C 90,10 90,-50 60,-80 C 30,-110 -10,-110 -40,-80" stroke-linecap="round"/>
  </g>

  <!-- Liten knute — nedre venstre -->
  <g transform="translate(220, 950) scale(0.3)" stroke-width="1.5" opacity="0.2">
    <path d="M -80,-40 C -50,-70 10,-70 40,-40 C 70,-10 70,30 40,60 C 10,90 -50,90 -80,60 C -110,30 -110,-10 -80,-40" stroke-linecap="round"/>
    <path d="M -40,-80 C -70,-50 -70,10 -40,40 C -10,70 30,70 60,40 C 90,10 90,-50 60,-80 C 30,-110 -10,-110 -40,-80" stroke-linecap="round"/>
  </g>

  <!-- Liten knute — nedre høyre -->
  <g transform="translate(980, 920) scale(0.35)" stroke-width="1.5" opacity="0.2">
    <path d="M -80,-40 C -50,-70 10,-70 40,-40 C 70,-10 70,30 40,60 C 10,90 -50,90 -80,60 C -110,30 -110,-10 -80,-40" stroke-linecap="round"/>
    <path d="M -40,-80 C -70,-50 -70,10 -40,40 C -10,70 30,70 60,40 C 90,10 90,-50 60,-80 C 30,-110 -10,-110 -40,-80" stroke-linecap="round"/>
  </g>

  <!-- Vertikale tau-linjer på sidene -->
  <g stroke-width="0.5" opacity="0.15">
    <!-- Venstre -->
    <path d="M 60,60 Q 40,90 60,120 Q 80,150 60,180 Q 40,210 60,240 Q 80,270 60,300 Q 40,330 60,360 Q 80,390 60,420 Q 40,450 60,480 Q 80,510 60,540 Q 40,570 60,600 Q 80,630 60,660 Q 40,690 60,720 Q 80,750 60,780 Q 40,810 60,840 Q 80,870 60,900 Q 40,930 60,960 Q 80,990 60,1020 Q 40,1050 60,1080 Q 80,1110 60,1140"/>
    <!-- Høyre -->
    <path d="M 1140,60 Q 1120,90 1140,120 Q 1160,150 1140,180 Q 1120,210 1140,240 Q 1160,270 1140,300 Q 1120,330 1140,360 Q 1160,390 1140,420 Q 1120,450 1140,480 Q 1160,510 1140,540 Q 1120,570 1140,600 Q 1160,630 1140,660 Q 1120,690 1140,720 Q 1160,750 1140,780 Q 1120,810 1140,840 Q 1160,870 1140,900 Q 1120,930 1140,960 Q 1160,990 1140,1020 Q 1120,1050 1140,1080 Q 1160,1110 1140,1140"/>
  </g>

  <!-- Dobbel tau-sirkel rundt senter-knuten -->
  <g stroke-width="0.5" opacity="0.15">
    <circle cx="600" cy="500" r="200"/>
    <circle cx="600" cy="500" r="205"/>
  </g>
</svg>
