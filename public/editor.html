<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamnvik Handelssted – Rediger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    .toolbar {
      background: #1a1a2e; color: #fff; padding: 8px 16px;
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .toolbar h1 { font-size: 14px; font-weight: 600; }
    .toolbar select {
      padding: 4px 8px; border-radius: 4px; border: 1px solid #444;
      background: #2a2a3e; color: #fff; font-size: 13px;
    }
    .toolbar label { font-size: 13px; color: #aaa; }
    .toolbar .spacer { flex: 1; }
    .toolbar .hint { font-size: 12px; color: #888; }

    .split {
      flex: 1; display: flex; overflow: hidden;
    }
    .split iframe {
      border: none; height: 100%;
    }
    .pane-admin { width: 50%; border-right: 2px solid #1a1a2e; }
    .pane-preview { width: 50%; }

    .divider {
      width: 4px; background: #1a1a2e; cursor: col-resize; flex-shrink: 0;
    }
    .divider:hover { background: #3a3a5e; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Hamnvik Handelssted — Redigering</h1>
    <div class="spacer"></div>
    <label for="page-select">Forhåndsvis side:</label>
    <select id="page-select">
      <option value="/">Forside</option>
      <option value="/om-oss">Om oss</option>
      <option value="/servering">Servering</option>
      <option value="/overnatting">Overnatting</option>
      <option value="/kulturformidling">Kulturformidling</option>
      <option value="/krambu">Krambu</option>
      <option value="/kontakt">Kontakt</option>
      <option value="/bilder">Bilder</option>
      <option value="/nyheter">Nyheter</option>
      <option value="/referanser">Referanser</option>
    </select>
    <span class="hint">Lagre i admin → siden oppdateres automatisk</span>
  </div>

  <div class="split">
    <iframe id="admin-frame" class="pane-admin" src="/admin/index.html"></iframe>
    <div class="divider" id="divider"></div>
    <iframe id="preview-frame" class="pane-preview" src="/"></iframe>
  </div>

  <script>
    const pageSelect = document.getElementById('page-select');
    const previewFrame = document.getElementById('preview-frame');
    const divider = document.getElementById('divider');
    const adminFrame = document.getElementById('admin-frame');

    pageSelect.addEventListener('change', () => {
      previewFrame.src = pageSelect.value;
    });

    // Draggable divider
    let isDragging = false;
    divider.addEventListener('mousedown', (e) => {
      isDragging = true;
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const splitRect = divider.parentElement.getBoundingClientRect();
      const pct = ((e.clientX - splitRect.left) / splitRect.width) * 100;
      const clamped = Math.min(80, Math.max(20, pct));
      adminFrame.style.width = clamped + '%';
      previewFrame.style.width = (100 - clamped) + '%';
    });
    document.addEventListener('mouseup', () => { isDragging = false; });
  </script>
</body>
</html>
