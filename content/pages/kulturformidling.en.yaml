heading: Cultural Experiences
deck: "Guided tours, talks and photo presentations in museum rooms full of stories"
byline: "Donsegården · Hamnvik, Ibestad"
intro: >-
  The buildings at Hamnvik Trading Post are not just beautiful — they are full of
  stories. We are happy to share them with you.
sections:
  - heading: Museum Rooms
    content: >-
      Several of the rooms at the trading post have been preserved as museum
      exhibitions, offering a glimpse into everyday life at a Northern Norwegian
      trading post through different eras. Here you can see artefacts, photographs
      and documents that tell about the people who lived and worked here — from the
      founding in 1794 to the present day.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Talks & Photo Presentations
    content: >-
      For groups and events, we offer talks with photo presentations about the trading
      post's development through over two hundred years. The stories span from the time
      of Jens Bing Dons, through the golden age of steamships when Prins Gustav docked
      here in 1838, to the royal visit in 2011 when King Harald and Queen Sonja were
      shown around the main house.
    image: /images/maleri.png
    imageAlt: Painting of Havnviken with boathouses and sailing ships in the 19th century
    imageCaption: Havnviken as an artist saw it in the 19th century
    pullQuote: >-
      The stories span from 1794, through the golden age of steamships,
      to the royal visit in 2011.
  - heading: ""
    content: ""
    image: /images/kongeskipet.png
    imageAlt: The Royal Yacht Norge moored at the quay in Hamnvik
    imageCaption: The Royal Yacht at quay in 2011
    pullQuote: ""
  - heading: The Heritage Trail Project
    content: >-
      The trading post is part of Ibestad municipality's heritage trail project, which
      works to document and convey the traces of previous generations' lives and work
      in the municipality. Through this project, the trading post's history is placed
      in a larger context — as part of the long story of the coastal community in Troms.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
noticeTitle: Book a Cultural Experience
noticeText: >-
  Cultural experiences can be booked for groups and events,
  preferably combined with a meal of traditional food.
  Contact us for information and booking.
