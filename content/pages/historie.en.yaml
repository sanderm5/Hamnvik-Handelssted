heading: The History of Hamnvik Trading Post
deck: "Two hundred years of trade, hospitality and coastal culture at one and the same wharf"
byline: "Donsegården · Hamnvik, Ibestad"
intro: >-
  For over two hundred years, Donsegården has been a hub on the coast of Troms —
  a place where trade, hospitality and coastal culture have gone hand in hand.
introBody: >-
  Hamnvik was an important trading centre in the Astafjord region in the 18th and
  19th centuries. It served not only as a marketplace but also as an administrative
  centre with officials including the sheriff, district judge and parish priest. The trading
  post lost its dominant role when Harstad grew in the 20th century.
pullQuote1: >-
  Through generations, the Dons family has maintained the estate.
  Today the buildings tell their story to all who will listen.
sections:
  - heading: "The Founder: Jens Bing Dons"
    content: >-
      Jens Bing Dons (1771–1823), son of Major Lorentz Dons, came north as a
      pharmacist and founded the trading post in 1794 together with Ingeborg Anna
      Normann Dons. He received an innkeeper's licence in 1795. A famous visit was
      Prince Louis Philippe — later King of France — who stayed that same year,
      fleeing the revolution.

      Business flourished, and cargo sailing became an important livelihood. During
      the war period 1807–1814, Dons traded with the Russians from Arkhangelsk to
      secure supplies for the population.
    image: /images/maleri.png
    imageAlt: Historical painting of the trading post with steamship at the quay
    imageCaption: "The steamship Prins Gustav arrives at Havnviken, 1838"
    pullQuote: ""
  - heading: Nicolai Normann Dons
    content: >-
      Nicolai Normann Dons (1798–1891) took over the trading post after his father's
      death in 1823. He continued the cargo trade, became postmaster in 1827, and was
      steamship agent from 1837. He was also elected as a parliamentary alternate for
      Finnmarkens amt (1848–1851).

      Ibestad Savings Bank was the first rural savings bank in Northern Norway and was
      established in Hamnvik in 1843. Nicolai served as managing director from 1843 to 1870.

      In 1873, King Oscar II was a guest at the estate, and in 1875 Nicolai was appointed
      Knight of the Order of St. Olav.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: "In 1873, King Oscar II was a guest at the estate, and in 1875 Nicolai was appointed Knight of the Order of St. Olav."
  - heading: The Buildings
    content: >-
      Hamnvik is one of the few Norwegian trading posts that has preserved its historic
      buildings. Parts of the structures date from the late 18th century and are in good
      condition. The area is protected and consists of 14 buildings, including the main
      house (from 1794), the old warehouse, storehouse, bakery, hotel (from 1896) and
      several other structures. The boathouses with their characteristic yellow walls and
      red roofs stand along the wharf, as they have for generations.
    image: /images/IMG_1853.jpg
    imageAlt: "Hamnvik Trading Post seen from the sea, with yellow boathouses along the wharf"
    imageCaption: "The trading post as it appears today, seen from the seaside"
    pullQuote: ""
  - heading: The Age of Steam
    content: >-
      When steamship traffic came to Northern Norway in the 19th century, Hamnvik became
      a natural stopping point along the coastal route. The steamship Prins Gustav was
      among the first to dock here in 1838. With the ships came goods, news and travellers
      from far and near, and the trading post flourished as never before.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Decline
    content: >-
      The golden age of trading posts ended in the 1870s. In 1872, the galeas "Njord"
      was shipwrecked, and steamship routes took over more of the freight traffic. The
      new trade law of 1868 marked the end of Hamnvik's dominance.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Modern Times
    content: >-
      During the 1960s, operations including farming, the steamship agency and the post office
      ceased. In the 1980s, market days began to be held. Michael Sund, a cultural
      consultant, helped transform the trading post into a culture-based tourism project
      for Ibestad municipality.

      Today the site offers dining, exhibitions, concerts, theatre and courses.
      The hotel from 1896 is still being restored.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: The Poem from 1894
    content: >-
      Provost Bendix Blom wrote a lengthy poem for the trading post's centenary in 1894,
      celebrating Jens Bing Dons and describing the family's history, their trials during
      the war of 1814, and their prosperity and contributions to society.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: The Heritage Trail Project
    content: >-
      Hamnvik Trading Post is part of Ibestad municipality's heritage trail project —
      an effort to preserve the traces of those who lived and worked here before us.
      Through the site, not only architecture and artefacts are conveyed, but also the
      stories of the people who built the coastal community in Ibestad.
    image: null
    imageAlt: ""
    imageCaption: ""
    pullQuote: ""
  - heading: Royal Visit to Hamnvik
    content: >-
      On 7 June 2011, Hamnvik Trading Post received a royal visit. King Harald and
      Queen Sonja came to Ibestad municipality, and part of the programme was a guided
      tour of the trading post. The royal couple was welcomed and shown into the Main
      House, where they heard about the history of the buildings and the life that has
      unfolded here through the generations.

      The royal yacht rounded Kipertnesset in good time and docked in the afternoon.
      Ibestad Brass Band played marches as the launch came ashore. County Governor
      Svein Ludvigsen accompanied the royal couple ashore, where Municipal Manager
      Helge Høve and Mayor Marit Johansen stood ready to welcome them. After the
      national anthem, the tour first went to the nursing home, then to a festive
      performance with local singers and musicians in the centre.

      At half past six in the evening, it was the trading post's turn. The royal couple
      was shown around the historic buildings, and NRK broadcast live for Nordnytt and
      Dagsrevyen. A day Hamnvik will not soon forget.
    image: /images/kongebesok/IMG_4917.jpg
    imageAlt: "The Royal Yacht Norge at the quay in Hamnvik, with the launch ready and a crowd waiting"
    imageCaption: The royal couple arrives at Hamnvik Trading Post
    pullQuote: >-
      NRK broadcast live for Nordnytt and Dagsrevyen.
      A day Hamnvik will not soon forget.
