heading: Restoration
deck: Preservation and restoration of the trading post buildings
byline: "Hamnvik Trading Post · Ibestad"
intro: >-
  Restoration of the trading post has been an ongoing effort since 2006.
  The quay and the Old Warehouse have received particular attention, and the
  hotel from 1896 is still being restored. Through this work, one of Northern
  Norway's best-preserved trading post environments is being preserved for
  future generations.
sections:
  - heading: Ongoing Work
    content: >-
      The restoration of the trading post is a long-term project. The work
      encompasses maintenance and repair of the protected buildings, with
      emphasis on preserving authentic materials and craft techniques. New
      updates will be added here as the work progresses.
