heading: Dining
deck: Homemade traditional cuisine in surroundings with two hundred years of history
byline: "Donsegården · Full licence"
intro: >-
  Take a seat in rooms where guests have been received for over two hundred years —
  and taste authentic Northern Norwegian traditional food made from scratch. We serve
  lunch and dinner for groups of minimum 10 people, by prior reservation.
sections:
  - heading: Food with Roots
    content: >-
      At Hamnvik Trading Post we serve homemade Norwegian traditional cuisine. The
      dishes are prepared with the same ingredients and recipes that have followed the
      coast through generations — fish from the fjord, wild herbs and time-honoured
      preparations. Everything made with care and served in surroundings that give
      the meal an extra dimension.

      We hold a full licence and can offer drinks to complement the food and the occasion.
    image: /images/galleri/tbe1480-torskemiddag.jpg
    imageAlt: "Beautifully plated cod with bacon bits, potatoes, scrambled egg and red wine"
    imageCaption: ""
    pullQuote: ""
  - heading: Celebrations & Events
    content: >-
      The old rooms of the trading post create a setting that no modern venue can
      replicate. Here you can celebrate anniversaries, birthdays or other occasions
      with wooden floors underfoot, candlelight on the table and history in the walls.
      We tailor the menu and setting to the occasion.
    image: /images/galleri/pyntet-bryllup.jpg
    imageAlt: "Long table set for a wedding with white linens, candles and flower arrangements in historic venue"
    imageCaption: ""
    pullQuote: ""
  - heading: Meetings with Character
    content: >-
      Looking for a meeting place that breaks from the ordinary? The trading post's rooms
      give meetings and gatherings a completely different atmosphere than an ordinary
      conference room. Why not combine it with a meal of traditional food and the story of
      this remarkable place.
    image: /images/galleri/boden-2etasje-interior.jpg
    imageAlt: "Rustic room with wooden walls, antique furniture, framed art and stained glass"
    imageCaption: ""
    pullQuote: >-
      The old rooms create a setting that no modern venue can replicate.
  - heading: Stories at the Table
    content: >-
      With the meal, we can offer talks and photo presentations about the life of the
      trading post through over two hundred years. From the founding in 1794, through
      the golden age of steamships and up to the present day. An experience that makes
      the food taste even better.
    image: /images/galleri/kaffekopp-donsegarden.jpg
    imageAlt: "Steaming coffee cup with Hamnvik Handelssted Donsegården logo on stacked stones"
    imageCaption: ""
    pullQuote: ""
noticeTitle: Booking — groups from 10 people
noticeText: >-
  We serve lunch and dinner for groups of minimum 10 people.
  Contact us for offers and reservations — we tailor the menu and
  arrangements to your wishes.
