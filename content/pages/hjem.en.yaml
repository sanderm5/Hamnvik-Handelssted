heading: Where history lives on
deck: "A protected trading post from 1794 — by the fjord in Hamnvik, Ibestad"
byline: "Donsegården · Hamnvik, Troms"
intro: >-
  Where the fjord meets the mountain in Hamnvik lies Donsegården — a protected
  trading post where history lives on through food, culture and hospitality.
bodyText1: >-
  Since 1794, this has been a gathering point on the coast of Troms. What began
  as Jens Bing Dons and Ingeborg Anna Normann Dons' trading post is today a
  living cultural monument where you can enjoy fine food and experience the
  stories from over two hundred years of coastal culture.
bodyText2: >-
  We open our doors for those who want to experience something out of the
  ordinary — whether it's a celebration with homemade traditional food or a
  guided tour through the rooms of history.
pullQuote: >-
  A living cultural monument where you can enjoy fine food and experience
  the stories from over two hundred years of coastal culture.
