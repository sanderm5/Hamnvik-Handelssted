dampskipHeading: From steamship to doorstep
dampskipText: >-
  Once, steamships docked here and brought goods from all over the world to the
  trading post in Hamnvik. Today it is the guests who arrive — to a place where
  time has stood still, but the hospitality is as warm as it has always been.
