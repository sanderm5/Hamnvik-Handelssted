heading: Restaurering
deck: Bevaring og restaurering av handelsstedets bygninger
byline: "Hamnvik Handelssted · Ibestad"
intro: >-
  Restaurering av handelsstedet har vært et pågående arbeid siden 2006.
  Kaia og Gammelbrygga har fått særlig oppmerksomhet, og hotellet fra 1896
  restaureres fortsatt. Gjennom dette arbeidet bevares et av Nord-Norges
  best bevarte handelsstedsmiljøer for fremtidige generasjoner.
sections:
  - heading: Pågående arbeid
    content: >-
      Restaureringen av handelsstedet er et langsiktig prosjekt. Arbeidet omfatter
      vedlikehold og istandsetting av de fredede bygningene, med vekt på å bevare
      autentiske materialer og håndverksteknikker. Nye oppdateringer legges til
      her etter hvert som arbeidet skrider frem.
